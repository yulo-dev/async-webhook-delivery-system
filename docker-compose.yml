version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./webhook.db
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  delivery_worker:
    build: .
    command: python -m app.workers.delivery_worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./webhook.db
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  retry_scheduler:
    build: .
    command: python -m app.workers.retry_scheduler
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./webhook.db
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  mock_receiver:
    build: .
    command: uvicorn mock_receiver.server:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    volumes:
      - .:/app
    working_dir: /app
